<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela Login</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0A1F44">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Login">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0A1F44;
      position: relative;
      overflow: hidden;
    }

    .circle1 {
      position: absolute;
      width: 250px; height: 250px;
      border-radius: 50%;
      background: rgba(79,142,247,0.1);
      top: -60px; right: -60px;
    }

    .circle2 {
      position: absolute;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(0,212,170,0.07);
      bottom: 40px; left: -50px;
    }

    .login-box {
      background: white;
      padding: 36px 28px;
      border-radius: 24px;
      width: 300px;
      text-align: center;
      position: relative;
      z-index: 1;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: fadeUp 0.5s ease both;
    }

    .login-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #4F8EF7, #2563cc);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 20px;
      box-shadow: 0 8px 24px rgba(79,142,247,0.35);
    }

    h2 { color: #0A1F44; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: #8A9BB8; font-size: 13px; margin-bottom: 24px; }

    .input-group { margin-bottom: 14px; text-align: left; }
    label { font-size: 12px; font-weight: 600; color: #0A1F44; display: block; margin-bottom: 6px; }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #E2E8F0;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #0A1F44;
      transition: border 0.2s;
      outline: none;
    }

    input:focus { border-color: #4F8EF7; }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #0A1F44, #132d5e);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 6px 20px rgba(10,31,68,0.3);
    }

    button:active { transform: scale(0.98); }

    .erro {
      color: #FF5A5A;
      font-size: 12px;
      margin-top: 10px;
      display: none;
      background: rgba(255,90,90,0.08);
      padding: 8px 12px;
      border-radius: 8px;
    }

    .voltar {
      margin-top: 16px;
      font-size: 13px;
      color: #8A9BB8;
    }

    .voltar a { color: #4F8EF7; text-decoration: none; font-weight: 500; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="circle1"></div>
  <div class="circle2"></div>

  <div class="login-box">
    <div class="login-icon">🔐</div>
    <h2>Login</h2>
    <p class="subtitle">Entre com seu RM e senha</p>

    <div class="input-group">
      <label>RM</label>
      <input type="text" id="rm" placeholder="Digite seu RM">
    </div>

    <div class="input-group">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="Digite sua senha">
    </div>

    <button onclick="fazerLogin()">Entrar</button>
    <div class="erro" id="erro">RM ou senha incorretos!</div>

    <p class="voltar"><a href="splash.html">← Voltar ao início</a></p>
  </div>

  <script>
    function fazerLogin() {
      const rm = document.getElementById('rm').value.trim();
      const senha = document.getElementById('senha').value.trim();
      const erro = document.getElementById('erro');

      if (!rm || !senha) {
        erro.textContent = 'Preencha o RM e a senha!';
        erro.style.display = 'block';
        return;
      }

      if (rm === '26681' && senha === 'alvaro123') {
        erro.style.display = 'none';
        window.location.href = 'dashboard.html';
      } else {
        erro.textContent = 'RM ou senha incorretos!';
        erro.style.display = 'block';
      }
    }

    // Enter para logar
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') fazerLogin();
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => console.log('SW registrado:', reg.scope))
        .catch(err => console.error('Erro no SW:', err));
    }
  </script>
</body>
</html>
