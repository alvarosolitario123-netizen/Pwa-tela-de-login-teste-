<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bem-vindo</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0A1F44">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0A1F44;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .circle1 {
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(79,142,247,0.12);
      top: -80px; right: -80px;
    }

    .circle2 {
      position: absolute;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(0,212,170,0.08);
      bottom: 60px; left: -60px;
    }

    .circle3 {
      position: absolute;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(79,142,247,0.08);
      bottom: 200px; right: 20px;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 40px 32px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.8s ease both;
    }

    .logo {
      width: 100px; height: 100px;
      background: linear-gradient(135deg, #4F8EF7, #00D4AA);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin-bottom: 32px;
      box-shadow: 0 20px 60px rgba(79,142,247,0.4);
    }

    h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    p {
      color: rgba(255,255,255,0.6);
      font-size: 15px;
      line-height: 1.6;
      max-width: 280px;
      margin-bottom: 48px;
    }

    .btn {
      width: 100%;
      max-width: 300px;
      padding: 16px;
      border-radius: 16px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4F8EF7, #2563cc);
      color: white;
      box-shadow: 0 8px 30px rgba(79,142,247,0.4);
      margin-bottom: 14px;
    }

    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .version {
      position: absolute;
      bottom: 24px;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="circle3"></div>

  <div class="content">
    <div class="logo">💰</div>
    <h1>Finanças Pessoais</h1>
    <p>Gerencie seu dinheiro de forma simples, rápida e segura.</p>
    <button class="btn btn-primary" onclick="window.location.href='index.html'">Fazer Login</button>
    <button class="btn btn-secondary">Saiba mais</button>
  </div>

  <span class="version">v1.0.0</span>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
